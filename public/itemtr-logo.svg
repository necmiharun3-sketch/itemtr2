<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient - Orange neon -->
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>
    
    <!-- TR text gradient -->
    <linearGradient id="trGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow for icon -->
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff6a00" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background optional (commented out for transparent) -->
  <!-- <rect width="400" height="120" fill="#0a0a0f"/> -->
  
  <!-- Icon container - rounded square with gradient border -->
  <g filter="url(#iconGlow)">
    <rect x="16" y="20" width="80" height="80" rx="16" fill="#12141d"/>
    <rect x="16" y="20" width="80" height="80" rx="16" stroke="url(#orangeGlow)" stroke-width="2.5" fill="none"/>
    
    <!-- Shopping bag icon stylized -->
    <path d="M40 45h32c4 0 8 4 8 8v28c0 4-4 8-8 8H40c-4 0-8-4-8-8V53c0-4 4-8 8-8z" fill="none" stroke="url(#orangeGlow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Bag handle -->
    <path d="M48 45V38c0-4.4 3.6-8 8-8s8 3.6 8 8v7" fill="none" stroke="url(#orangeGlow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Checkmark in bag -->
    <path d="M48 65l6 6 14-14" stroke="#ff6a00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Text: item -->
  <text x="112" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="white" filter="url(#shadow)">item</text>
  
  <!-- Text: TR with gradient and glow -->
  <text x="202" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#trGradient)" filter="url(#glow)">TR</text>
  
  <!-- Text: .com -->
  <text x="272" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="600" fill="#6b7280">.com</text>
  
  <!-- Accent underline -->
  <rect x="112" y="82" width="190" height="3" rx="1.5" fill="url(#orangeGlow)" filter="url(#glow)"/>
</svg>
